<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honung från Dalarna</title>
<meta name="description" content="Lokal honung från Dalarna – just nu i lager, 120 kr för 650 gram.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --honey-dark: #2E1A05;
    --honey-amber: #D98C0F;
    --honey-light: #F7D998;
    --cream: #FFF9EE;
    --clover: #6B7A4F;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--cream);
    color: var(--honey-dark);
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    padding: 32px 20px 64px;
    line-height: 1.5;
  }

  main {
    max-width: 520px;
    width: 100%;
  }

  .eyebrow {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--clover);
    margin: 0 0 12px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(32px, 7vw, 44px);
    line-height: 1.1;
    margin: 0 0 18px;
  }

  .intro {
    font-size: 17px;
    margin: 0 0 28px;
    max-width: 40ch;
  }

  /* Honeycomb divider — nod to the actual hex cells in the hive */
  .comb {
    display: flex;
    gap: 6px;
    margin: 0 0 32px;
  }
  .comb svg { width: 28px; height: 24px; }
  .comb polygon {
    fill: none;
    stroke: var(--honey-amber);
    stroke-width: 2;
  }

  .price-card {
    background: var(--honey-dark);
    color: var(--cream);
    border-radius: 14px;
    padding: 28px 28px 24px;
    margin-bottom: 28px;
    transition: transform 0.2s ease;
  }
  @media (prefers-reduced-motion: reduce) {
    .price-card { transition: none; }
  }
  .price-card:hover { transform: translateY(-2px); }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--honey-light);
    margin-bottom: 14px;
  }
  .status::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #6FBF6F;
    display: inline-block;
  }

  .price-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }

  .price {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 48px;
    color: var(--honey-amber);
  }

  .unit {
    font-size: 16px;
    color: var(--honey-light);
  }

  .cabinet-card {
    background: var(--honey-light);
    border: 2px solid var(--honey-amber);
    border-radius: 14px;
    padding: 24px 26px;
    margin: 0 0 24px;
  }
  .cabinet-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--honey-dark);
    margin: 0 0 10px;
  }
  .cabinet-address {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 26px;
    margin: 0 0 8px;
    color: var(--honey-dark);
  }
  .cabinet-sub {
    font-size: 14px;
    color: #6B5A3E;
    margin: 0;
  }

  .contact {
    border: 1px dashed #D9C9A8;
    border-radius: 12px;
    padding: 18px 20px;
    font-size: 15px;
    color: #6B5A3E;
  }
  .contact p { margin: 0 0 8px; }
  .contact p:last-child { margin-bottom: 0; }
  .section-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--clover);
    margin: 0 0 12px;
  }
  .contact-name {
    font-weight: 600;
    color: var(--honey-dark);
  }

  a {
    color: var(--honey-dark);
    text-decoration-color: var(--honey-amber);
  }
  a:focus-visible, .price-card:focus-visible {
    outline: 2px solid var(--clover);
    outline-offset: 3px;
  }

  footer {
    margin-top: 36px;
    font-size: 13px;
    color: #9A8A6E;
  }
</style>
</head>
<body>
<main>
  <p class="eyebrow">Lokal honung</p>
  <h1>Honung från egen bigård</h1>

  <div class="comb" aria-hidden="true">
    <svg viewBox="0 0 28 24"><polygon points="7,1 21,1 27,12 21,23 7,23 1,12"/></svg>
    <svg viewBox="0 0 28 24"><polygon points="7,1 21,1 27,12 21,23 7,23 1,12"/></svg>
    <svg viewBox="0 0 28 24"><polygon points="7,1 21,1 27,12 21,23 7,23 1,12"/></svg>
    <svg viewBox="0 0 28 24"><polygon points="7,1 21,1 27,12 21,23 7,23 1,12"/></svg>
  </div>

  <div class="price-card" tabindex="0">
    <p class="status">I lager nu</p>
    <div class="price-row">
      <span class="price">120 kr</span>
      <span class="unit">/ 650 gram</span>
    </div>
  </div>

  <div class="cabinet-card">
    <p class="cabinet-label">Finns att köpa i självbetjäningsskåpet</p>
    <p class="cabinet-address">Tolvmilavägen 116, Borlänge</p>
  </div>

  <div class="contact">
    <p class="section-label">Frågor?</p>
    <p class="contact-name">Ludwig Eweström</p>
    <p><a href="tel:0762554103">076-255 41 03</a></p>
    <p><a href="mailto:ludwig.ewestrom@gmail.com">ludwig.ewestrom@gmail.com</a></p>
    <p>Tolvmilavägen 116, Borlänge</p>
  </div>

</main>
</body>
</html>
